<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Aras</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');

        :root {
            --green: #00ff88;
            --red: #ff4444;
            --bg: #0a0a0a;
            --surface: #111;
            --border: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #eee;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* LOGIN SCREEN */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'JetBrains Mono', monospace;
            color: var(--green);
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-box p {
            color: #666;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        /* ADMIN PANEL */
        #adminPanel {
            display: none;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            color: var(--green);
            font-size: 1.1rem;
        }

        .logout-btn {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 32px;
            background: var(--surface);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #1a1a1a;
            color: var(--green);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* FORM */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 1rem;
            color: var(--green);
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #eee;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--green);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--green);
            color: #000;
        }

        .btn-primary:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: none;
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red);
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* LIST */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .list-item-info h3 {
            font-size: 0.95rem;
            color: #ddd;
            margin-bottom: 4px;
        }

        .list-item-info p {
            font-size: 0.8rem;
            color: #555;
        }

        /* NOTIFICATION */
        .notify {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 9999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .notify.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notify.success {
            background: #0d2b1e;
            border: 1px solid var(--green);
            color: var(--green);
        }

        .notify.error {
            background: #2b0d0d;
            border: 1px solid var(--red);
            color: var(--red);
        }

        /* PASSWORD INPUT */
        .password-group {
            position: relative;
        }

        .password-group input {
            padding-right: 48px;
        }

        .show-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1rem;
        }

        /* URL'den alınan API */
        .api-url-display {
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--green);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>⚡ ADMIN</h1>
            <p>Aras portföy yönetim paneli</p>

            <div class="form-group">
                <label>API URL (Backend adresi)</label>
                <input type="url" id="apiUrlInput" placeholder="https://aras-portfolio-backend.onrender.com" />
            </div>

            <div class="form-group" style="margin-top:12px;">
                <label>Admin Şifre</label>
                <div class="password-group">
                    <input type="password" id="passwordInput" placeholder="••••••••" />
                    <button class="show-pass" onclick="togglePass()">👁</button>
                </div>
            </div>

            <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <!-- ADMİN PANELİ -->
    <div id="adminPanel">
        <div class="header">
            <div class="logo">⚡ ARAS ADMIN</div>
            <button class="logout-btn" onclick="logout()">Çıkış</button>
        </div>

        <div class="container">
            <div class="api-url-display" id="apiUrlDisplay">API: -</div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('blog')">📝 Blog</button>
                <button class="tab-btn" onclick="switchTab('projects')">🚀 Projeler</button>
                <button class="tab-btn" onclick="switchTab('skills')">✨ Yetenekler</button>
            </div>

            <!-- BLOG TAB -->
            <div class="tab-panel active" id="tab-blog">
                <div class="card">
                    <h2>// YENİ YAZI EKLE</h2>
                    <div class="form-group">
                        <label>Başlık *</label>
                        <input type="text" id="blogTitle" placeholder="Yazı başlığı..." />
                    </div>
                    <div class="form-group">
                        <label>Kısa Özet (liste görünümü)</label>
                        <textarea id="blogContent" placeholder="Kısa bir özet..." style="min-height:80px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tam İçerik (HTML destekli)</label>
                        <textarea id="blogFullContent" placeholder="<p>Yazının tam içeriği...</p>"></textarea>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="form-group">
                            <label>Okuma Süresi</label>
                            <input type="text" id="blogReadTime" placeholder="3 dk" value="3 dk" />
                        </div>
                        <div class="form-group">
                            <label>Etiketler (virgülle ayır)</label>
                            <input type="text" id="blogTags" placeholder="Düşüncelerim, Kod, Oyun" />
                        </div>
                    </div>
                    <button class="btn btn-primary" id="btnSubmitBlog" onclick="submitBlog()">✚ Yazıyı Kaydet</button>
                    <button class="btn btn-danger" id="btnCancelBlog" onclick="cancelEdit('blog')"
                        style="display:none; margin-left:10px;">İptal</button>
                </div>

                <div class="card">
                    <h2>// MEVCUT YAZILAR</h2>
                    <div class="item-list" id="blogList">
                        <p style="color:#555;">Yükleniyor...</p>
                    </div>
                </div>
            </div>

            <!-- PROJELER TAB -->
            <div class="tab-panel" id="tab-projects">
                <div class="card">
                    <h2>// YENİ PROJE EKLE</h2>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="form-group" style="grid-column:span 2;">
                            <label>Proje Adı *</label>
                            <input type="text" id="projName" placeholder="Proje adı..." />
                        </div>
                        <div class="form-group" style="grid-column:span 2;">
                            <label>Açıklama</label>
                            <textarea id="projDesc" placeholder="Proje açıklaması..."
                                style="min-height:80px;"></textarea>
                        </div>
                        <div class="form-group" style="grid-column:span 2;">
                            <label>Teknolojiler (virgülle ayır)</label>
                            <input type="text" id="projTech" placeholder="HTML, CSS, JavaScript, Python" />
                        </div>
                        <div class="form-group">
                            <label>Durum</label>
                            <select id="projStatus">
                                <option value="active">Aktif</option>
                                <option value="completed">Tamamlandı</option>
                                <option value="testing">Test Aşamasında</option>
                                <option value="planning">Planlama</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>İlerleme (%)</label>
                            <input type="number" id="projProgress" placeholder="75" min="0" max="100" />
                        </div>
                        <div class="form-group">
                            <label>GitHub Linki</label>
                            <input type="url" id="projGithub" placeholder="https://github.com/..." />
                        </div>
                        <div class="form-group">
                            <label>Demo Linki</label>
                            <input type="url" id="projDemo" placeholder="https://..." />
                        </div>
                    </div>
                    <button class="btn btn-primary" id="btnSubmitProject" onclick="submitProject()">✚ Projeyi
                        Kaydet</button>
                    <button class="btn btn-danger" id="btnCancelProject" onclick="cancelEdit('project')"
                        style="display:none; margin-left:10px;">İptal</button>
                </div>

                <div class="card">
                    <h2>// MEVCUT PROJELER</h2>
                    <div class="item-list" id="projectList">
                        <p style="color:#555;">Yükleniyor...</p>
                    </div>
                </div>
            </div>

            <!-- YETENEKLER TAB -->
            <div class="tab-panel" id="tab-skills">
                <div class="card">
                    <h2 id="skillFormTitle">// YENİ YETENEK EKLE</h2>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="form-group" style="grid-column:span 2;">
                            <label>Yetenek Adı *</label>
                            <input type="text" id="skillName" placeholder="JavaScript, React, Python..." />
                        </div>
                        <div class="form-group">
                            <label>Kategori *</label>
                            <select id="skillCategory">
                                <option value="Programming Languages">Programming Languages</option>
                                <option value="Frameworks & Libraries">Frameworks & Libraries</option>
                                <option value="Tools & Technologies">Tools & Technologies</option>
                                <option value="Databases">Databases</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kategori İkonu (Emoji/FontAwesome)</label>
                            <input type="text" id="skillCategoryIcon" placeholder='<i class="fa-solid fa-code"></i>' />
                        </div>
                        <div class="form-group">
                            <label>Yetenek İkonu</label>
                            <input type="text" id="skillIcon" placeholder='<i class="fa-brands fa-js"></i>' />
                        </div>
                        <div class="form-group">
                            <label>Yüzde (0-100)</label>
                            <input type="number" id="skillPercentage" placeholder="90" min="0" max="100" />
                        </div>
                        <div class="form-group">
                            <label>Seviye</label>
                            <select id="skillLevel">
                                <option value="beginner">Başlangıç</option>
                                <option value="intermediate">Orta</option>
                                <option value="advanced">İleri</option>
                                <option value="expert">Uzman</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="btnSubmitSkill" onclick="submitSkill()">✚ Yeteneği
                        Kaydet</button>
                    <button class="btn btn-danger" id="btnCancelSkill" onclick="cancelEdit('skill')"
                        style="display:none; margin-left:10px;">İptal</button>
                </div>

                <div class="card">
                    <h2>// MEVCUT YETENEKLER</h2>
                    <div class="item-list" id="skillList">
                        <p style="color:#555;">Yükleniyor...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="notify" id="notify"></div>

    <script>
        let API_URL = '';
        let ADMIN_PASS = '';

        const statusLabels = {
            active: 'Aktif',
            completed: 'Tamamlandı',
            testing: 'Test Aşamasında',
            planning: 'Planlama Aşamasında'
        };

        const levelLabels = {
            beginner: 'Başlangıç',
            intermediate: 'Orta',
            advanced: 'İleri',
            expert: 'Uzman'
        };

        let isEditing = {
            blog: false,
            project: false,
            skill: false
        };

        let editId = {
            blog: null,
            project: null,
            skill: null
        };

        let currentData = {
            blog: [],
            project: [],
            skill: []
        };

        function togglePass() {
            const inp = document.getElementById('passwordInput');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        async function login() {
            const apiUrl = document.getElementById('apiUrlInput').value.trim().replace(/\/$/, '');
            const password = document.getElementById('passwordInput').value.trim();

            if (!apiUrl || !password) {
                showNotify('API URL ve şifre zorunlu!', 'error');
                return;
            }

            try {
                // Test bağlantısı
                const res = await fetch(`${apiUrl}/api/blog`);
                if (!res.ok) throw new Error('API bağlanamadı');

                API_URL = apiUrl;
                ADMIN_PASS = password;

                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('apiUrlDisplay').textContent = `API: ${API_URL}`;

                loadBlogPosts();
                loadProjects();
                loadSkills();
            } catch (e) {
                showNotify('API\'ye bağlanılamadı. URL\'yi kontrol edin.', 'error');
            }
        }

        function logout() {
            API_URL = ''; ADMIN_PASS = '';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        // BLOG
        async function loadBlogPosts() {
            const list = document.getElementById('blogList');
            try {
                const res = await fetch(`${API_URL}/api/blog`);
                const posts = await res.json();
                currentData.blog = posts;
                if (!posts.length) { list.innerHTML = '<p style="color:#555;">Henüz yazı yok.</p>'; return; }
                list.innerHTML = posts.map(p => `
                <div class="list-item">
                    <div class="list-item-info">
                        <h3>${p.title}</h3>
                        <p>${new Date(p.created_at).toLocaleDateString('tr-TR')} &bull; ${p.read_time} &bull; ${(p.tags || []).join(', ')}</p>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.8rem;" onclick="editBlog(${p.id})">Düzenle</button>
                        <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.8rem;" onclick="deleteBlog(${p.id})">Sil</button>
                    </div>
                </div>
            `).join('');
            } catch (e) { list.innerHTML = '<p style="color:red;">Yüklenemedi</p>'; }
        }

        async function submitBlog() {
            const title = document.getElementById('blogTitle').value.trim();
            const content = document.getElementById('blogContent').value.trim();
            const full_content = document.getElementById('blogFullContent').value.trim();
            const read_time = document.getElementById('blogReadTime').value.trim() || '3 dk';
            const tagsRaw = document.getElementById('blogTags').value.trim();
            const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

            if (!title || !content) { showNotify('Başlık ve özet zorunlu!', 'error'); return; }

            const method = isEditing.blog ? 'PUT' : 'POST';
            const endpoint = isEditing.blog ? `/api/blog/${editId.blog}` : '/api/blog';

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS, title, content, full_content: full_content || content, read_time, tags })
                });
                if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
                showNotify(isEditing.blog ? 'Yazı güncellendi!' : 'Yazı eklendi!', 'success');
                cancelEdit('blog');
                loadBlogPosts();
            } catch (e) { showNotify(e.message || 'Hata oluştu', 'error'); }
        }

        function editBlog(id) {
            const post = currentData.blog.find(p => p.id === id);
            if (!post) return;

            isEditing.blog = true;
            editId.blog = id;

            document.getElementById('blogTitle').value = post.title;
            document.getElementById('blogContent').value = post.content;
            document.getElementById('blogFullContent').value = post.full_content || post.content;
            document.getElementById('blogReadTime').value = post.read_time;
            document.getElementById('blogTags').value = (post.tags || []).join(', ');

            document.getElementById('btnSubmitBlog').innerHTML = '💾 Değişiklikleri Kaydet';
            document.getElementById('btnCancelBlog').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteBlog(id) {
            if (!confirm('Bu yazıyı silmek istediğinizden emin misiniz?')) return;
            try {
                const res = await fetch(`${API_URL}/api/blog/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS })
                });
                if (!res.ok) throw new Error('Silinemedi');
                showNotify('Yazı silindi.', 'success');
                loadBlogPosts();
            } catch (e) { showNotify('Silme başarısız!', 'error'); }
        }

        // PROJELER
        async function loadProjects() {
            const list = document.getElementById('projectList');
            try {
                const res = await fetch(`${API_URL}/api/projects`);
                const projects = await res.json();
                currentData.project = projects;
                if (!projects.length) { list.innerHTML = '<p style="color:#555;">Henüz proje yok.</p>'; return; }
                list.innerHTML = projects.map(p => `
                <div class="list-item">
                    <div class="list-item-info">
                        <h3>${p.name}</h3>
                        <p>${statusLabels[p.status] || p.status} &bull; %${p.progress} &bull; ${(p.technologies || []).join(', ')}</p>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.8rem;" onclick="editProject(${p.id})">Düzenle</button>
                        <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.8rem;" onclick="deleteProject(${p.id})">Sil</button>
                    </div>
                </div>
            `).join('');
            } catch (e) { list.innerHTML = '<p style="color:red;">Yüklenemedi</p>'; }
        }

        async function submitProject() {
            const name = document.getElementById('projName').value.trim();
            const description = document.getElementById('projDesc').value.trim();
            const techRaw = document.getElementById('projTech').value.trim();
            const technologies = techRaw ? techRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
            const status = document.getElementById('projStatus').value;
            const status_text = statusLabels[status];
            const progress = parseInt(document.getElementById('projProgress').value) || 0;
            const github_link = document.getElementById('projGithub').value.trim() || '#';
            const demo_link = document.getElementById('projDemo').value.trim() || '#';

            if (!name) { showNotify('Proje adı zorunlu!', 'error'); return; }

            const method = isEditing.project ? 'PUT' : 'POST';
            const endpoint = isEditing.project ? `/api/projects/${editId.project}` : '/api/projects';

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS, name, description, technologies, status, status_text, progress, github_link, demo_link })
                });
                if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
                showNotify(isEditing.project ? 'Proje güncellendi!' : 'Proje eklendi!', 'success');
                cancelEdit('project');
                loadProjects();
            } catch (e) { showNotify(e.message || 'Hata oluştu', 'error'); }
        }

        function editProject(id) {
            const p = currentData.project.find(item => item.id === id);
            if (!p) return;

            isEditing.project = true;
            editId.project = id;

            document.getElementById('projName').value = p.name;
            document.getElementById('projDesc').value = p.description || '';
            document.getElementById('projTech').value = (p.technologies || []).join(', ');
            document.getElementById('projStatus').value = p.status;
            document.getElementById('projProgress').value = p.progress || 0;
            document.getElementById('projGithub').value = p.github_link !== '#' ? p.github_link : '';
            document.getElementById('projDemo').value = p.demo_link !== '#' ? p.demo_link : '';

            document.getElementById('btnSubmitProject').innerHTML = '💾 Değişiklikleri Kaydet';
            document.getElementById('btnCancelProject').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteProject(id) {
            if (!confirm('Bu projeyi silmek istediğinizden emin misiniz?')) return;
            try {
                const res = await fetch(`${API_URL}/api/projects/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS })
                });
                if (!res.ok) throw new Error('Silinemedi');
                showNotify('Proje silindi.', 'success');
                loadProjects();
            } catch (e) { showNotify('Silme başarısız!', 'error'); }
        }

        // YETENEKLER (SKILLS)
        async function loadSkills() {
            const list = document.getElementById('skillList');
            try {
                const res = await fetch(`${API_URL}/api/skills`);
                const skills = await res.json();
                currentData.skill = skills;
                if (!skills.length) { list.innerHTML = '<p style="color:#555;">Henüz yetenek yok.</p>'; return; }
                list.innerHTML = skills.map(s => `
                <div class="list-item">
                    <div class="list-item-info">
                        <h3>${s.icon} ${s.name}</h3>
                        <p>${s.category} &bull; %${s.percentage} &bull; ${levelLabels[s.level]}</p>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-primary" style="padding: 8px 16px; font-size: 0.8rem;" onclick="editSkill(${s.id})">Düzenle</button>
                        <button class="btn btn-danger" style="padding: 8px 16px; font-size: 0.8rem;" onclick="deleteSkill(${s.id})">Sil</button>
                    </div>
                </div>
            `).join('');
            } catch (e) { list.innerHTML = '<p style="color:red;">Yüklenemedi</p>'; }
        }

        async function submitSkill() {
            const name = document.getElementById('skillName').value.trim();
            const category = document.getElementById('skillCategory').value;
            const category_icon = document.getElementById('skillCategoryIcon').value.trim();
            const icon = document.getElementById('skillIcon').value.trim();
            const percentage = parseInt(document.getElementById('skillPercentage').value) || 0;
            const level = document.getElementById('skillLevel').value;

            if (!name) { showNotify('Yetenek adı zorunlu!', 'error'); return; }

            const method = isEditing.skill ? 'PUT' : 'POST';
            const endpoint = isEditing.skill ? `/api/skills/${editId.skill}` : '/api/skills';

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS, name, category, category_icon, icon, percentage, level })
                });
                if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
                showNotify(isEditing.skill ? 'Yetenek güncellendi!' : 'Yetenek eklendi!', 'success');
                cancelEdit('skill');
                loadSkills();
            } catch (e) { showNotify(e.message || 'Hata oluştu', 'error'); }
        }

        function editSkill(id) {
            const s = currentData.skill.find(item => item.id === id);
            if (!s) return;

            isEditing.skill = true;
            editId.skill = id;

            document.getElementById('skillName').value = s.name;
            document.getElementById('skillCategory').value = s.category;
            document.getElementById('skillCategoryIcon').value = s.category_icon || '';
            document.getElementById('skillIcon').value = s.icon || '';
            document.getElementById('skillPercentage').value = s.percentage || 0;
            document.getElementById('skillLevel').value = s.level || 'beginner';

            document.getElementById('skillFormTitle').innerHTML = '// YETENEK DÜZENLE';
            document.getElementById('btnSubmitSkill').innerHTML = '💾 Değişiklikleri Kaydet';
            document.getElementById('btnCancelSkill').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteSkill(id) {
            if (!confirm('Bu yeteneği silmek istediğinizden emin misiniz?')) return;
            try {
                const res = await fetch(`${API_URL}/api/skills/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASS })
                });
                if (!res.ok) throw new Error('Silinemedi');
                showNotify('Yetenek silindi.', 'success');
                loadSkills();
            } catch (e) { showNotify('Silme başarısız!', 'error'); }
        }

        // FORMLARI SIFIRLAMA
        function cancelEdit(type) {
            isEditing[type] = false;
            editId[type] = null;

            if (type === 'blog') {
                ['blogTitle', 'blogContent', 'blogFullContent', 'blogTags'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('blogReadTime').value = '3 dk';
                document.getElementById('btnSubmitBlog').innerHTML = '✚ Yazıyı Ekle';
                document.getElementById('btnCancelBlog').style.display = 'none';
            } else if (type === 'project') {
                ['projName', 'projDesc', 'projTech', 'projGithub', 'projDemo'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('projStatus').value = 'active';
                document.getElementById('projProgress').value = '';
                document.getElementById('btnSubmitProject').innerHTML = '✚ Projeyi Ekle';
                document.getElementById('btnCancelProject').style.display = 'none';
            } else if (type === 'skill') {
                ['skillName', 'skillCategoryIcon', 'skillIcon', 'skillPercentage'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('skillCategory').value = 'Programming Languages';
                document.getElementById('skillLevel').value = 'beginner';
                document.getElementById('skillFormTitle').innerHTML = '// YENİ YETENEK EKLE';
                document.getElementById('btnSubmitSkill').innerHTML = '✚ Yeteneği Kaydet';
                document.getElementById('btnCancelSkill').style.display = 'none';
            }
        }

        // BİLDİRİM
        function showNotify(msg, type) {
            const el = document.getElementById('notify');
            el.textContent = msg;
            el.className = `notify ${type} show`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ENTER ile giriş
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') login();
        });
    </script>
</body>

</html>
